name: Playwright TypeScript Example

on:
  workflow_dispatch:
    inputs:
      browser:
        required: true
        type: choice
        options: [chromium, firefox, webkit]
      environment:
        required: true
        type: choice
        options: [pipeline, local]

jobs:
  test:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 1
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 18

      - name: Install dependencies
        run: npm ci

      - name: Install Playwright browsers
        run: npx playwright install --with-deps chromium

      - name: Run Playwright tests
        run: |
          echo "Browser: ${{ github.event.inputs.browser }}"
          echo "Environment: ${{ github.event.inputs.environment }}"
          if [ "${{ github.event.inputs.environment }}" == "local" ]; then
            npm run test-local-allure
          else
            npm run test-pipeline-allure
          fi

      - name: Upload Allure Results
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: allure-results-${{ github.event.inputs.browser }}-${{ github.event.inputs.environment }}
          path: allure-results/
          retention-days: 30

      - name: Upload Test Results
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: test-results-${{ github.event.inputs.browser }}-${{ github.event.inputs.environment }}
          path: test-results/
          retention-days: 30

      - name: Generate Allure Report
        if: always()
        run: |
          npm run allure:generate

      - name: Upload Allure Report
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: allure-report-${{ github.event.inputs.browser }}-${{ github.event.inputs.environment }}
          path: allure-report/
          retention-days: 30
